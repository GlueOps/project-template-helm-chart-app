suite: Job
templates:
  - job.yaml
set:
  appName: "example-app"

tests:
  - it: should not create a job by default
    set:
      job.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a job when enabled
    set:
      job:
        enabled: true
        jobs:
          db-migration:
            serviceAccount:
              enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Job
      - matchRegex:
          path: metadata.name
          pattern: "-db-migration$"
      - notExists:
          path: spec.template.spec.serviceAccountName
          value: ""

  - it: should render the job when job.serviceAccount.enabled is set to true
    set:
      job:
        enabled: true
        jobs:
          db-migration:
            serviceAccount:
              enabled: true
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: example-app

  - it: should render the job with the correct environment variables
    set:
      job:
        enabled: true
        jobs:
          db-migration:
            envMap:
              foo:
                value: bar
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: foo
            value: "bar"

  - it: should include commonLabels in job metadata
    set:
      job:
        enabled: true
        jobs:
          db-migration:
            serviceAccount:
              enabled: false
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - isNotNullOrEmpty:
          path: metadata.labels["helm.sh/chart"]

  - it: should render job.annotations in job metadata
    set:
      job:
        enabled: true
        annotations:
          example.com/owner: my-team
        jobs:
          db-migration:
            serviceAccount:
              enabled: false
    asserts:
      - equal:
          path: metadata.annotations["example.com/owner"]
          value: "my-team"