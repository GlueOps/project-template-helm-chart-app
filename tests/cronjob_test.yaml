suite: CronJob
templates:
  - cronjob.yaml
set:
  appName: "example-app"

tests:
  - it: should be disabled by default
    set:
      cronJob.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should be enabled when cronJob.enabled is true
    set:
      cronJob:
        enabled: true
        jobs:
          testjob1:
            schedule: "* * * 8 *"
            image: nginx
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: CronJob
      - isAPIVersion:
          of: batch/v1
      - matchRegex:
          path: metadata.name
          pattern: '-testjob1$'
      - isNull:
          path: spec.jobTemplate.spec.template.spec.tolerations

  - it: should apply tolerations when specified
    set:
      cronJob:
        enabled: true
        jobs:
          cronjob:
            tolerations:
            - effect: NoSchedule
              key: k8s-node-role/job-worker
              operator: Equal
              value: "true"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.tolerations[0].effect
          value: NoSchedule
      - equal:
          path: spec.jobTemplate.spec.template.spec.tolerations[0].key
          value: "k8s-node-role/job-worker"
      - equal:
          path: spec.jobTemplate.spec.template.spec.tolerations[0].operator
          value: Equal
      - equal:
          path: spec.jobTemplate.spec.template.spec.tolerations[0].value
          value: "true"

  - it: should render backoffLimit when specified
    set:
      cronJob:
        enabled: true
        jobs:
          testjob:
            schedule: "* * * * *"
            backoffLimit: 4
    asserts:
      - equal:
          path: spec.jobTemplate.spec.backoffLimit
          value: 4

  - it: should render ttlSecondsAfterFinished when specified
    set:
      cronJob:
        enabled: true
        jobs:
          testjob:
            schedule: "* * * * *"
            ttlSecondsAfterFinished: 300
    asserts:
      - equal:
          path: spec.jobTemplate.spec.ttlSecondsAfterFinished
          value: 300

  - it: should render parallelism when specified
    set:
      cronJob:
        enabled: true
        jobs:
          testjob:
            schedule: "* * * * *"
            parallelism: 3
    asserts:
      - equal:
          path: spec.jobTemplate.spec.parallelism
          value: 3

  - it: should render completions when specified
    set:
      cronJob:
        enabled: true
        jobs:
          testjob:
            schedule: "* * * * *"
            completions: 5
    asserts:
      - equal:
          path: spec.jobTemplate.spec.completions
          value: 5

  - it: should render activeDeadlineSeconds when specified
    set:
      cronJob:
        enabled: true
        jobs:
          testjob:
            schedule: "* * * * *"
            activeDeadlineSeconds: 600
    asserts:
      - equal:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
          value: 600

  - it: should not render job spec fields when not specified
    set:
      cronJob:
        enabled: true
        jobs:
          testjob:
            schedule: "* * * * *"
            image: nginx
    asserts:
      - isNull:
          path: spec.jobTemplate.spec.backoffLimit
      - isNull:
          path: spec.jobTemplate.spec.ttlSecondsAfterFinished
      - isNull:
          path: spec.jobTemplate.spec.parallelism
      - isNull:
          path: spec.jobTemplate.spec.completions
      - isNull:
          path: spec.jobTemplate.spec.activeDeadlineSeconds

  - it: should keep suspend at CronJob spec level only
    set:
      cronJob:
        enabled: true
        jobs:
          testjob:
            schedule: "* * * * *"
            suspend: true
    asserts:
      - equal:
          path: spec.suspend
          value: true
      - isNull:
          path: spec.jobTemplate.spec.suspend
