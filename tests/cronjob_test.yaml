suite: CronJob
templates:
  - cronjob.yaml
set:
  appName: "example-app"

tests:
  - it: should be disabled by default
    set:
      cronJob.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should be enabled when cronJob.enabled is true
    set:
      cronJob:
        enabled: true
        jobs:
          testjob1:
            schedule: "* * * 8 *"
            image: nginx
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: CronJob
      - isAPIVersion:
          of: batch/v1
      - matchRegex:
          path: metadata.name
          pattern: '-testjob1$'
      - isNull:
          path: spec.jobTemplate.spec.template.spec.tolerations

  - it: should apply tolerations when specified
    set:
      cronJob:
        enabled: true
        jobs:
          cronjob:
            tolerations:
            - effect: NoSchedule
              key: k8s-node-role/job-worker
              operator: Equal
              value: "true"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.tolerations[0].effect
          value: NoSchedule
      - equal:
          path: spec.jobTemplate.spec.template.spec.tolerations[0].key
          value: "k8s-node-role/job-worker"
      - equal:
          path: spec.jobTemplate.spec.template.spec.tolerations[0].operator
          value: Equal
      - equal:
          path: spec.jobTemplate.spec.template.spec.tolerations[0].value
          value: "true"

  - it: should render distinct labels for multiple cronjobs
    set:
      cronJob:
        enabled: true
        jobs:
          first-job:
            schedule: "0 * * * *"
            image: nginx
          second-job:
            schedule: "30 * * * *"
            image: nginx
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: example-app-first-job
        documentSelector:
          path: metadata.name
          value: example-app-first-job
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: example-app-second-job
        documentSelector:
          path: metadata.name
          value: example-app-second-job
